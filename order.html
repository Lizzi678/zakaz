<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Расчет стоимости — NEON54</title>
    <style>
        /* Минимальные стили для проверки, добавь свои неоновые эффекты сюда */
        body { background: #050505; color: #fff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .quiz-container { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #00f2ff; width: 90%; max-width: 500px; text-align: center; }
        .step { display: none; }
        .step.active { display: block; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: #fff; box-sizing: border-box; }
        button { background: #00f2ff; color: #000; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 15px; }
        button:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <div class="quiz-container">
        <div class="step active" id="step1">
            <h2>Тип конструкции?</h2>
            <button onclick="nextStep('step1', 'step2', 'start', 'Неоновая вывеска')">Неоновая вывеска</button>
            <button onclick="nextStep('step1', 'step2', 'start', 'Объемные буквы')">Объемные буквы</button>
        </div>

        <div class="step" id="step2">
            <h2>Где вешаем?</h2>
            <button onclick="nextStep('step2', 'step3', 'Location', 'Внутри')">Интерьер</button>
            <button onclick="nextStep('step2', 'step3', 'Location', 'Снаружи')">Улица</button>
        </div>

        <div class="step" id="step3">
            <h2>Оставьте контакты</h2>
            <input type="text" id="phoneInput" placeholder="Ваш телефон">
            <textarea id="descInput" placeholder="Дополнительные пожелания..."></textarea>
            <button type="button" onclick="handleFinalSubmit()">ОТПРАВИТЬ ЗАКАЗ</button>
        </div>
    </div>

    <script src="quiz-logic.js"></script>
</body>
</html>
