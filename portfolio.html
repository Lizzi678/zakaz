<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Портфолио | НЕОН 54</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Unbounded:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .page-container { max-width: 1200px; margin: 120px auto 60px; padding: 0 20px; }
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; margin-top: 30px; }
        .portfolio-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 16px; padding: 16px; backdrop-filter: blur(10px); }
        .portfolio-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 12px; margin-bottom: 12px; }
        .portfolio-title { font-size: 1.15rem; font-weight: 600; color: #fff; margin-bottom: 4px; }
        .portfolio-category { font-size: 0.85rem; color: #888; }
        .portfolio-price { color: #00f3ff; font-weight: 700; font-size: 1.1rem; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="site-wrapper">
        <header>
            <div class="container header-inner">
                <div class="logo" onclick="location.href='index.html'">НЕОН<span>54</span></div>
                <nav class="nav">
                    <a href="index.html">Главная</a>
                    <a href="portfolio.html" class="active">Портфолио</a>
                    <a href="news.html">Новости</a>
                </nav>
            </div>
        </header>

        <div class="page-container">
            <h1 style="font-family: 'Unbounded', sans-serif; color: #00f3ff;">НАШИ РАБОТЫ</h1>
            <div id="portfolio-container" class="portfolio-grid"></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const db = JSON.parse(localStorage.getItem('neon54_db')) || { portfolio: [] };
            const container = document.getElementById('portfolio-container');
            
            if (!db.portfolio || db.portfolio.length === 0) {
                container.innerHTML = '<p style="color: #aaa;">Работы пока не добавлены.</p>';
                return;
            }

            container.innerHTML = db.portfolio.map(item => `
                <div class="portfolio-card">
                    <img src="${item.image}" alt="${item.title}">
                    <div class="portfolio-title">${item.title}</div>
                    <div class="portfolio-category">${item.category}</div>
                    ${item.price ? `<div class="portfolio-price">${Number(item.price).toLocaleString('ru-RU')} ₽</div>` : ''}
                </div>
            `).join('');
        });
    </script>
</body>
</html>
