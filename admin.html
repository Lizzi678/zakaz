<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления сайтом NEON54</title>
    <style>
        body { background: #0b0b0e; color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; padding: 30px; margin: 0; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { color: #00f3ff; text-shadow: 0 0 15px rgba(0, 243, 255, 0.4); margin-bottom: 30px; font-size: 2rem; }
        .card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); padding: 25px; border-radius: 16px; margin-bottom: 25px; backdrop-filter: blur(10px); }
        h2 { margin-top: 0; color: #ff007f; font-size: 1.4rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        label { display: block; margin: 15px 0 5px; color: #ccc; font-size: 0.9rem; }
        input[type="text"], input[type="number"], textarea, select { width: 100%; padding: 12px; background: #141419; border: 1px solid #2d2d37; border-radius: 8px; color: #fff; box-sizing: border-box; font-size: 14px; }
        input[type="text"]:focus, input[type="number"]:focus, textarea:focus, select:focus { border-color: #00f3ff; outline: none; }
        button { background: linear-gradient(90deg, #ff007f, #ff0055); color: white; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; width: 100%; font-size: 15px; }
        button:hover { opacity: 0.9; box-shadow: 0 0 15px rgba(255, 0, 127, 0.4); }
        
        .btn-portfolio { background: linear-gradient(90deg, #00f3ff, #00bfff); color: #000; }
        .btn-portfolio:hover { box-shadow: 0 0 15px rgba(0, 243, 255, 0.4); }
        
        .manage-list { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; max-height: 300px; overflow-y: auto; padding-right: 5px; }
        .manage-item { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.02); padding: 10px 15px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .manage-item img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; margin-right: 15px; border: 1px solid #333; }
        .item-info { display: flex; align-items: center; }
        .item-title { font-weight: 500; font-size: 0.95rem; }
        .item-meta { font-size: 0.8rem; color: #888; margin-top: 2px; }
        .item-price { color: #00f3ff; font-weight: 600; font-size: 0.85rem; }
        .btn-delete { background: #2a1118; color: #ff4a5a; border: 1px solid #5a1827; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; width: auto; margin-top: 0; }
        .btn-delete:hover { background: #bd1f35; color: #fff; box-shadow: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Панель управления NEON54</h1>

    <div class="card">
        <h2>Добавить работу в портфолио</h2>
        <form id="portfolio-form">
            <label for="p-title">Название вывески</label>
            <input type="text" id="p-title" placeholder="Например: Неоновый логотип Coffee" required>

            <label for="p-category">Категория</label>
            <select id="p-category">
                <option value="Для бизнеса">Для бизнеса</option>
                <option value="Для дома">Для дома</option>
            </select>

            <label for="p-price">Стоимость работы (в рублях)</label>
            <input type="number" id="p-price" placeholder="Например: 12500" required min="0">

            <label for="p-image">Изображение вывески</label>
            <input type="file" id="p-image" accept="image/*" required style="margin-top:5px; color:#aaa;">

            <button type="submit" class="btn-portfolio">Опубликовать в портфолио</button>
        </form>

        <h3 style="margin-top: 30px; font-size: 1.1rem; color: #00f3ff;">Текущие работы (Удаление)</h3>
        <div id="portfolio-manage-list" class="manage-list"></div>
    </div>

    <div class="card">
        <h2>Добавить новость</h2>
        <form id="news-form">
            <label for="n-title">Заголовок новости</label>
            <input type="text" id="n-title" placeholder="Заголовок" required>

            <label for="n-text">Текст новости</label>
            <textarea id="n-text" rows="5" placeholder="Введите текст новости..." required></textarea>

            <label for="n-image">Картинка (необязательно)</label>
            <input type="file" id="n-image" accept="image/*" style="margin-top:5px; color:#aaa;">

            <button type="submit">Опубликовать новость</button>
        </form>

        <h3 style="margin-top: 30px; font-size: 1.1rem; color: #ff007f;">Текущие новости (Удаление)</h3>
        <div id="news-manage-list" class="manage-list"></div>
    </div>
</div>

<script>
    function getDB() {
        return JSON.parse(localStorage.getItem('neon54_db')) || { news: [], portfolio: [] };
    }

    function saveDB(data) {
        try {
            localStorage.setItem('neon54_db', JSON.stringify(data));
            renderLists();
            return true;
        } catch (e) {
            alert("Ошибка сохранения! Изображение слишком большого размера. Попробуйте загрузить файл меньшего размера.");
            return false;
        }
    }

    // Функция для авто-сжатия изображений перед сохранением в localStorage
    function processImage(file, maxWidth = 800) {
        return new Promise((resolve, reject) => {
            if (!file) resolve('');
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth) {
                        height = Math.round((height * maxWidth) / width);
                        width = maxWidth;
                    }

                    canvas.width = width;
                    canvas.height = height;

                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7)); // Сжатие до 70% качества
                };
            };
            reader.onerror = error => reject(error);
        });
    }

    function renderLists() {
        const db = getDB();
        const pList = document.getElementById('portfolio-manage-list');
        const nList = document.getElementById('news-manage-list');

        // Портфолио
        pList.innerHTML = (!db.portfolio || db.portfolio.length === 0) ? '<div style="opacity:0.5; font-size:0.9rem;">Работ пока нет</div>' : '';
        (db.portfolio || []).forEach(item => {
            const div = document.createElement('div');
            div.className = 'manage-item';
            const priceText = item.price ? ` — <span class="item-price">${Number(item.price).toLocaleString('ru-RU')} ₽</span>` : '';
            div.innerHTML = `
                <div class="item-info">
                    <img src="${item.image}" alt="">
                    <div>
                        <div class="item-title">${item.title}</div>
                        <div class="item-meta">${item.category}${priceText}</div>
                    </div>
                </div>
                <button class="btn-delete" onclick="deletePortfolio(${item.id})">Удалить</button>
            `;
            pList.appendChild(div);
        });

        // Новости
        nList.innerHTML = (!db.news || db.news.length === 0) ? '<div style="opacity:0.5; font-size:0.9rem;">Новостей пока нет</div>' : '';
        (db.news || []).forEach(item => {
            const div = document.createElement('div');
            div.className = 'manage-item';
            const imgTag = item.image ? `<img src="${item.image}" alt="">` : '<div style="width:50px; height:50px; background:#141419; margin-right:15px; border-radius:6px; border:1px solid #333;"></div>';
            div.innerHTML = `
                <div class="item-info">
                    ${imgTag}
                    <div>
                        <div class="item-title">${item.title}</div>
                        <div class="item-meta">${item.date}</div>
                    </div>
                </div>
                <button class="btn-delete" onclick="deleteNews(${item.id})">Удалить</button>
            `;
            nList.appendChild(div);
        });
    }

    window.deletePortfolio = function(id) {
        if(confirm("Удалить работу из портфолио?")) {
            let db = getDB();
            db.portfolio = (db.portfolio || []).filter(item => item.id !== id);
            saveDB(db);
        }
    }

    window.deleteNews = function(id) {
        if(confirm("Удалить новость?")) {
            let db = getDB();
            db.news = (db.news || []).filter(item => item.id !== id);
            saveDB(db);
        }
    }

    // Добавление в Портфолио
    document.getElementById('portfolio-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const imageFile = document.getElementById('p-image').files[0];
        const base64Image = await processImage(imageFile);
        
        let db = getDB();
        db.portfolio = db.portfolio || [];
        db.portfolio.push({
            id: Date.now(),
            title: document.getElementById('p-title').value.trim(),
            category: document.getElementById('p-category').value,
            price: document.getElementById('p-price').value,
            image: base64Image
        });
        
        if (saveDB(db)) {
            alert("Работа успешно сохранена!");
            this.reset();
        }
    });

    // Добавление в Новости
    document.getElementById('news-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        const imageFile = document.getElementById('n-image').files[0];
        const base64Image = imageFile ? await processImage(imageFile) : '';
        
        let db = getDB();
        db.news = db.news || [];
        db.news.push({
            id: Date.now(),
            title: document.getElementById('n-title').value.trim(),
            date: new Date().toLocaleDateString('ru-RU'),
            text: document.getElementById('n-text').value.trim(),
            image: base64Image
        });
        
        if (saveDB(db)) {
            alert("Новость успешно опубликована!");
            this.reset();
        }
    });

    document.addEventListener('DOMContentLoaded', renderLists);
</script>
</body>
</html>
